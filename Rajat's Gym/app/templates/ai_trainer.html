<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Trainer - Smart Fitness Planner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f0f16;
            color: white;
            font-family: poppins, sans-serif;
        }

        .card {
            background: #1a1b24;
            border: 1px solid #27293d;
        }

        .btn-warning {
            font-weight: bold;
        }

        h2 {
            font-weight: 800;
            color: #ffc404;
        }

        .list-group-item {
            background: #181920;
            color: white;
        }

        .nav-btn-global {
            position: fixed;
            bottom: 22px;
            padding: 9px 22px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            background: #6A5ACD;
            border: none;
            color: white;
            z-index: 9999;
            transition: .25s;
        }

        .nav-btn-global:hover {
            background: #4d3fb7;
        }

        #globalBack {
            left: 22px;
        }

        #globalHome {
            right: 22px;
        }
    </style>
</head>

<body class="text-center p-5">

    <h2>🤖 AI Fitness Planner</h2>
    <p>Smart workout recommendations based on your selection</p>
    <hr class="text-secondary w-75 mx-auto">

    <form action="/ai_trainer" method="POST" class="card p-4 w-50 mx-auto mt-4">

        <label class="text-warning fw-bold">Choose Goal</label>
        <select name="goal" class="form-control mb-3" required>
            <option value="fatloss">🔥 Fat Loss</option>
            <option value="muscle">💪 Muscle Gain</option>
            <option value="strength">🏋 Strength</option>
            <option value="beginner">🔰 Beginner</option>
            <option value="home">🏠 Home Workout</option>
        </select>

        <label class="text-warning fw-bold">Experience Level</label>
        <select name="level" class="form-control mb-3">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
        </select>

        <label class="text-warning fw-bold">Body Type</label>
        <select name="body" class="form-control mb-3">
            <option>Lean</option>
            <option>Normal</option>
            <option>Bulk</option>
        </select>

        <button class="btn btn-warning w-100">Generate Plan 🚀</button>
    </form>

    <button onclick="history.back()" id="backBtn" class="nav-btn">⬅ Back</button>
    <a href="/" id="homeBtn" class="nav-btn">Home</a>

</body>

</html>
