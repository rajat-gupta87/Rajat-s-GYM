<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>🏠 Home Workout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --pri: #6A5ACD;
            --pri-dark: #4d3fb7;
            --bg: #0e091c;
        }

        body {
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: white;
            text-align: center;
            padding-top: 60px;
        }

        .glass-card {
            width: 60%;
            margin: auto;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 25px rgba(106, 90, 205, 0.6);
        }

        .title {
            font-weight: 800;
            color: #b892ff;
        }

        .level-select {
            width: 50%;
            margin: auto;
            background: #1e1a2e;
            color: white;
            border: 1px solid var(--pri);
        }

        .btn-purple {
            background: var(--pri);
            color: white;
            font-weight: 600;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .btn-purple:hover {
            background: var(--pri-dark);
        }

        .level-badge {
            background: var(--pri);
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 14px;
        }

        .workout-item {
            background: rgba(255, 255, 255, 0.08);
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .workout-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.03);
        }

        /* Bottom Buttons */
        .nav-btn {
            position: fixed;
            bottom: 20px;
            padding: 10px 25px;
            font-weight: 700;
            border-radius: 10px;
            border: none;
            color: white;
            background: var(--pri);
            box-shadow: 0 0 15px rgba(140, 120, 255, .6);
            transition: .25s;
        }

        .nav-btn:hover {
            background: var(--pri-dark);
            transform: scale(1.05);
        }

        #backBtn {
            left: 20px;
        }

        #homeBtn {
            right: 20px;
        }

        @media(max-width:768px) {
            .glass-card {
                width: 90%;
            }

            .level-select {
                width: 80%;
            }
        }
    </style>
</head>

<body>

    <h2 class="title">🏠 Home Workout Plan</h2>
    <p class="text-light">Train hard. No excuses. Only results. 🔥</p>

    <div class="glass-card mt-4">

        <!-- Level Selection Form -->
        <form method="POST">
            <select name="level" class="form-select level-select">
                <option value="beginner" {% if level=="Beginner" %}selected{% endif %}>Beginner</option>
                <option value="intermediate" {% if level=="Intermediate" %}selected{% endif %}>Intermediate</option>
                <option value="advanced" {% if level=="Advanced" %}selected{% endif %}>Advanced</option>
            </select>

            <button class="btn-purple">Show Workout</button>
        </form>

        <hr style="opacity:.2; margin:25px 0;">

        <h5>
            Current Level:
            <span class="level-badge">{{ level }}</span>
        </h5>

        <!-- Workout List -->
        <div class="mt-4">
            {% for workout in workouts %}
            <div class="workout-item">
                💪 {{ workout }}
            </div>
            {% endfor %}
        </div>

    </div>

    <!-- Navigation Buttons -->
    <button id="backBtn" onclick="history.back()" class="nav-btn">⬅ Back</button>
    <a id="homeBtn" href="{{ url_for('dashboard') }}" class="nav-btn">🏠 Home</a>

</body>

</html>
