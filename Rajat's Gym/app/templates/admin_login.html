<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login — Rajat's Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --acc: #ff9f43;
            --acc-d: #e0851f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 70% 30%, #2a1200 0%, #08051a 60%);
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .admin-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 159, 67, .04);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 159, 67, .18);
            border-radius: 22px;
            padding: 40px 36px;
            box-shadow: 0 16px 60px rgba(0, 0, 0, .5), 0 0 60px rgba(255, 159, 67, .05);
            animation: fadeUp .6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .brand {
            font-size: 1.3rem;
            font-weight: 900;
            text-align: center;
        }

        .brand-sub {
            text-align: center;
            color: var(--acc);
            font-size: .82rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .sub {
            text-align: center;
            color: rgba(255, 255, 255, .35);
            font-size: .82rem;
            margin-bottom: 28px;
        }

        .form-label {
            color: #ffd18c;
            font-weight: 600;
            font-size: .85rem;
            margin-bottom: 5px;
        }

        .form-control {
            background: rgba(255, 159, 67, .08) !important;
            border: 1.5px solid rgba(255, 159, 67, .3) !important;
            color: #ffe4b0 !important;
            border-radius: 10px;
            padding: 12px 14px 12px 40px;
            font-size: .92rem;
        }

        .form-control:focus {
            border-color: var(--acc) !important;
            box-shadow: 0 0 0 3px rgba(255, 159, 67, .2) !important;
        }

        .form-control::placeholder {
            color: rgba(255, 228, 176, .3) !important;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffa040;
            font-size: 1rem;
        }

        .btn-admin {
            background: linear-gradient(135deg, #ff9f43, #ff6b6b);
            color: #1a1a1a;
            border: none;
            border-radius: 12px;
            width: 100%;
            padding: 13px;
            font-size: 1rem;
            font-weight: 800;
            box-shadow: 0 0 28px rgba(255, 159, 67, .45);
            transition: .25s;
            cursor: pointer;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 32px rgba(255, 159, 67, .55);
        }

        a.text-link {
            color: #ffd18c;
            font-weight: 600;
            text-decoration: none;
        }

        a.text-link:hover {
            text-decoration: underline;
        }

        .alert-box {
            background: rgba(220, 53, 69, .2);
            border: 1px solid rgba(220, 53, 69, .4);
            border-radius: 10px;
            padding: 11px 14px;
            color: #ffadad;
            font-size: .87rem;
            margin-bottom: 16px;
        }

        .default-cred {
            background: rgba(255, 159, 67, .08);
            border: 1px solid rgba(255, 159, 67, .2);
            border-radius: 10px;
            padding: 10px 14px;
            color: rgba(255, 215, 140, .7);
            font-size: .78rem;
            text-align: center;
            margin-top: 14px;
        }
    </style>
</head>

<body>
    <div class="admin-card">
        <div class="brand">🛡️ SmartGym</div>
        <div class="brand-sub">ADMIN PORTAL</div>
        <div class="sub">Restricted access — authorised personnel only</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert-box"><i class="bi bi-exclamation-circle me-1"></i>{{ msg }}</div>
        {% endfor %}
        {% endwith %}

        <form method="POST" action="/admin/login">
            <div class="mb-3">
                <label class="form-label">Admin Email</label>
                <div class="input-wrap">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" name="email" class="form-control" placeholder="rajat@gym.com" required
                        autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-wrap">
                    <i class="bi bi-key input-icon"></i>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-admin">
                <i class="bi bi-shield-check me-2"></i>Access Admin Panel
            </button>
        </form>


        <p class="text-center mt-3" style="font-size:.8rem;">
            <a href="/login" class="text-link" style="opacity:.6;">← User login</a>
            &nbsp;·&nbsp;
            <a href="/" class="text-link" style="opacity:.6;">Home</a>
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
