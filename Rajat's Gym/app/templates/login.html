<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — SmartGym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --pri: #6A5ACD; --pri-d: #4d3fb7; }
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 30% 40%, #2a1060 0%, #08051a 60%);
            min-height: 100vh; font-family: 'Poppins', sans-serif;
            color: #fff; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .login-card {
            width: 100%; max-width: 420px;
            background: rgba(255,255,255,.05); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 22px; padding: 40px 36px;
            box-shadow: 0 16px 60px rgba(0,0,0,.5);
            animation: fadeUp .6s ease;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
        .brand { font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 6px; }
        .brand span { color: #ff9f43; }
        .sub { text-align: center; color: rgba(255,255,255,.4); font-size: .85rem; margin-bottom: 28px; }
        .form-label { color: #c4a9f5; font-weight: 600; font-size: .85rem; margin-bottom: 5px; }
        .form-control {
            background: rgba(189,161,255,.12) !important;
            border: 1.5px solid rgba(122,91,248,.4) !important;
            color: #e7d8ff !important; border-radius: 10px;
            padding: 12px 14px; font-size: .92rem;
        }
        .form-control:focus {
            border-color: #9b7af0 !important;
            box-shadow: 0 0 0 3px rgba(106,90,205,.25) !important;
        }
        .form-control::placeholder { color: rgba(231,216,255,.3) !important; }
        .input-icon-wrap { position: relative; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9b7af0; font-size: 1rem; }
        .input-icon-wrap .form-control { padding-left: 40px; }
        .btn-login-main {
            background: linear-gradient(135deg, var(--pri), #9b6cf0);
            color: #fff; border: none; border-radius: 12px; width: 100%;
            padding: 13px; font-size: 1rem; font-weight: 800;
            box-shadow: 0 0 24px rgba(106,90,205,.55); transition: .25s; cursor: pointer;
        }
        .btn-login-main:hover { transform: translateY(-2px); box-shadow: 0 4px 28px rgba(106,90,205,.65); }
        .divider { text-align: center; color: rgba(255,255,255,.25); font-size: .8rem; margin: 18px 0; position: relative; }
        .divider::before, .divider::after {
            content: ''; position: absolute; top: 50%; width: 40%; height: 1px;
            background: rgba(255,255,255,.12);
        }
        .divider::before { left: 0; } .divider::after { right: 0; }
        a.text-link { color: #d7b7ff; font-weight: 600; text-decoration: none; }
        a.text-link:hover { color: #ff9f43; text-decoration: underline; }
        .alert-box {
            background: rgba(220,53,69,.2); border: 1px solid rgba(220,53,69,.4);
            border-radius: 10px; padding: 11px 14px;
            color: #ffadad; font-size: .87rem; margin-bottom: 16px;
        }
        .alert-success-box {
            background: rgba(46,204,113,.15); border: 1px solid rgba(46,204,113,.3);
            border-radius: 10px; padding: 11px 14px;
            color: #a3f5c0; font-size: .87rem; margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand">🏋️ Smart<span>Gym</span></div>
    <div class="sub">Welcome back — let's get to work</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="{{ 'alert-success-box' if cat == 'success' else 'alert-box' }}">
            <i class="bi bi-{{ 'check-circle' if cat == 'success' else 'exclamation-circle' }} me-1"></i>{{ msg }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-icon-wrap">
                <i class="bi bi-envelope input-icon"></i>
                <input type="email" name="email" class="form-control" placeholder="you@email.com" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-icon-wrap">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>
        <button type="submit" class="btn-login-main">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login to SmartGym
        </button>
    </form>

    <div class="divider">or</div>

    <p class="text-center" style="font-size:.88rem;color:rgba(255,255,255,.5);">
        No account? <a href="/register" class="text-link">Create one for free →</a>
    </p>
    <p class="text-center mt-2" style="font-size:.8rem;">
        <a href="/admin/login" class="text-link" style="opacity:.6;">
            <i class="bi bi-shield-lock me-1"></i>Admin login
        </a>
    </p>
    <p class="text-center mt-3" style="font-size:.78rem;">
        <a href="/" class="text-link" style="opacity:.5;">← Back to home</a>
    </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
