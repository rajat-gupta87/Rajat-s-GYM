<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fitness Coach</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --pri: #6A5ACD;
            --pri-dark: #4d3fb7;
            --light: #ffffff;
        }

        body {
            background: #f5f1ff;
            font-family: "Poppins", sans-serif;
        }

        .assistant-container {
            max-width: 750px;
            margin: auto;
        }

        .chat-box {
            height: 460px;
            overflow-y: auto;
            background: white;
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 0 18px rgba(0, 0, 0, .08);
        }

        .user-msg,
        .ai-msg {
            max-width: 75%;
            padding: 11px 15px;
            border-radius: 12px;
            font-size: 15px;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }

        .user-msg {
            margin-left: auto;
            background: var(--pri);
            color: #fff;
        }

        .ai-msg {
            background: #ece7ff;
            border: 1px solid #d5caff;
        }

        /* INPUT AREA */
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .input-area input {
            border-radius: 10px;
        }

        .send-btn {
            background: var(--pri);
            color: white;
            border: none;
            font-weight: 600;
            border-radius: 10px;
            width: 105px;
        }

        .send-btn:hover {
            background: var(--pri-dark);
        }

        /* MIC BUTTON */
        .mic-btn {
            width: 50px;
            border-radius: 10px;
            background: #ffb13b;
            border: none;
            font-weight: bold;
            color: #222;
        }

        .mic-btn.recording {
            background: #ff4d4d;
            color: white;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        .reset-btn {
            margin-top: 10px;
            padding: 8px 20px;
            border-radius: 8px;
            background: #ffb949;
            border: none;
            font-weight: 600;
        }

        /* HOME + BACK BUTTONS */
        .nav-btn {
            position: fixed;
            bottom: 20px;
            padding: 9px 22px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            background: var(--pri);
            border: none;
            color: white;
        }

        #backBtn {
            left: 20px;
        }

        #homeBtn {
            right: 20px;
        }

        .nav-btn:hover {
            background: var(--pri-dark);
        }
    </style>
</head>

<body>

    <div class="assistant-container mt-4">

        <h2 class="text-center fw-bold" style="color:var(--pri)">🤖 AI Fitness Coach</h2>
        <p class="text-center text-secondary mb-3">Ask — Workout | Diet | BMI | Strength | Weight Loss 💪🔥</p>

        <!-- CHAT WINDOW -->
        <div class="chat-box" id="chatArea">
            {% for msg in chat %}
            {% if msg.sender == "user" %}
            <div class="user-msg">{{msg.text}}</div>
            {% else %}
            <div class="ai-msg">{{msg.text}}</div>
            {% endif %}
            {% endfor %}
        </div>

        <!-- INPUT WITH MIC -->
        <form method="POST" class="input-area">
            <button type="button" id="micBtn" class="mic-btn">🎤</button>
            <input name="question" id="voiceInput" class="form-control" placeholder="Speak or Type..." required
                autocomplete="off">
            <button class="send-btn">Send ▶</button>
        </form>

        <!-- RESET CHAT -->
        <form method="POST" class="text-center">
            <input type="hidden" name="question" value="reset">
            <button class="reset-btn">🔄 Reset Chat</button>
        </form>

    </div>

    <!-- SCRIPT -->
    <script>
        const chatBox = document.getElementById("chatArea");
        chatBox.scrollTop = chatBox.scrollHeight;

        /* 🎤 Speech To Text */
        let mic = document.getElementById("micBtn");
        let input = document.getElementById("voiceInput");

        if ("webkitSpeechRecognition" in window) {
            let rec = new webkitSpeechRecognition();
            rec.lang = "en-IN";
            rec.interimResults = false;

            mic.onclick = () => { rec.start(); mic.classList.add("recording"); };

            rec.onresult = e => {
                input.value = e.results[0][0].transcript;   // ← just fill box
                mic.classList.remove("recording");
            };
            rec.onend = () => mic.classList.remove("recording");
        }
    </script>

    <!-- FIXED NAV BUTTONS -->
    <button onclick="history.back()" id="backBtn" class="nav-btn">⬅ Back</button>
    <a href="/" id="homeBtn" class="nav-btn">🏠 Home</a>

</body>

</html>
