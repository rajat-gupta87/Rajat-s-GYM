<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calories & Protein Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --pri: #6A5ACD;
            --pri-dark: #4d3fb7;
            --glow: rgba(160, 120, 255, .55);
        }

        body {
            background: #0b0918;
            font-family: Poppins, sans-serif;
            color: white;
            text-align: center;
            padding-top: 40px;
        }

        h2 {
            font-weight: 800;
            color: #d3b3ff;
        }

        .box {
            width: 480px;
            margin: auto;
            background: rgba(255, 255, 255, .06);
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 0 22px rgba(170, 120, 255, .4);
        }

        label {
            font-weight: 600;
            color: #e4cbff;
        }

        input,
        select {
            background: #b498ff !important;
            color: #f1e3ff;
            border: 1px solid #9b71ff;
            font-weight: 600;
            border-radius: 8px;
        }

        .btn-purple {
            background: #a86bff;
            font-weight: 700;
            color: white;
            border-radius: 8px;
            box-shadow: 0 0 16px var(--glow);
        }

        .btn-purple:hover {
            background: #c598ff;
            transform: scale(1.05);
        }

        .result-box {
            width: 460px;
            margin: auto;
            background: #fff;
            color: #111;
            padding: 22px;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(255, 255, 255, .22);
            font-weight: 600;
        }

        /* 🔥 THEMED BACK + HOME BUTTON */
        .nav-btn {
            position: fixed;
            bottom: 20px;
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 700;
            color: white;
            border: none;
            font-size: 15px;
            background: var(--pri);
            box-shadow: 0 0 15px var(--glow);
            text-decoration: none;
            transition: .25s;
            z-index: 999;
        }

        .nav-btn:hover {
            background: var(--pri-dark);
            transform: scale(1.1);
        }

        #backBtn {
            left: 20px;
        }

        #homeBtn {
            right: 20px;
            background: #8d6aff;
        }

        #homeBtn:hover {
            background: #b498ff;
        }
    </style>
</head>

<body>

    <h2>🔥 Calories & Protein Calculator</h2>
    <p class="text-light mb-4">Smart nutrition values for your body type 💪</p>

    <form method="POST" class="box">

        <label>Weight (KG)</label>
        <input type="number" step="0.1" name="weight" class="form-control mb-3" required>

        <label>Height Input Mode</label>
        <select name="mode" class="form-control mb-3" id="heightMode" onchange="switchMode()">
            <option value="cm">📏 Centimeter</option>
            <option value="ft">🦶 Feet + Inch</option>
        </select>

        <div id="cmBox">
            <label>Height (cm)</label>
            <input type="number" name="height_cm" class="form-control mb-3">
        </div>

        <div id="ftBox" style="display:none">
            <label>Height (Feet)</label>
            <input type="number" name="height_ft" class="form-control mb-2">
            <label>Height (Inch)</label>
            <input type="number" name="height_in" class="form-control mb-3">
        </div>

        <button class="btn-purple w-100">Calculate 🔥</button>

    </form>

    <script>
        function switchMode() {
            document.getElementById("cmBox").style.display =
                (document.getElementById("heightMode").value == "cm") ? "block" : "none";
            document.getElementById("ftBox").style.display =
                (document.getElementById("heightMode").value == "ft") ? "block" : "none";
        }
    </script>

    {% if bmi %}
    <hr class="text-light mt-4">
    <h3 class="fw-bold text-info mb-2">📊 Result Summary</h3>

    <div class="result-box">
        <p class="fs-5 mb-1">BMI → <span style="color:#7d39ff">{{bmi}}</span></p>
        <p class="mb-1">Calories Needed → <span style="color:#ff2960">{{cal}} kcal/day</span></p>
        <p>Protein Requirement → <span style="color:#09d979">{{pro}}g/day</span></p>
    </div>
    {% endif %}

    <!-- 🔥 Final Matched Nav Buttons -->
    <button onclick="history.back()" id="backBtn" class="nav-btn">⬅ Back</button>
    <a href="/" id="homeBtn" class="nav-btn">🏠 Home</a>

</body>

</html>
