<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Recommendation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --pri: #6A5ACD;
            --pri-dark: #4d3fb7;
            --glow: rgba(140, 120, 255, .55)
        }

        body {
            background: #0b0918;
            font-family: Poppins, sans-serif;
            color: white;
            text-align: center;
            padding-top: 60px;
        }

        h2 {
            color: #e7d0ff;
            font-weight: 800;
            letter-spacing: .5px;
        }

        .diet-box {
            width: 460px;
            margin: auto;
            background: rgba(255, 255, 255, .07);
            padding: 26px;
            border-radius: 16px;
            box-shadow: 0 0 18px rgba(160, 120, 255, .35);
            backdrop-filter: blur(10px);
        }

        select {
            background: #1b1a29;
            border: 1px solid #a76dff;
            color: #e9d3ff;
            font-weight: 600;
        }

        .btn-purple {
            background: #9b5cff;
            color: white;
            font-weight: 700;
            border-radius: 9px;
            box-shadow: 0 0 18px var(--glow);
            transition: .3s;
        }

        .btn-purple:hover {
            background: #b78aff;
            transform: scale(1.05);
        }


        /* ========== NEW MATCHED BACK & HOME BUTTONS ========== */
        .nav-btn {
            position: fixed;
            bottom: 22px;
            padding: 9px 23px;
            font-weight: 700;
            border-radius: 10px;
            font-size: 15px;
            border: none;
            z-index: 9999;
            color: white;
            background: var(--pri);
            box-shadow: 0 0 15px var(--glow);
            transition: .25s;
        }

        .nav-btn:hover {
            background: var(--pri-dark);
            transform: scale(1.08);
        }

        #backBtn {
            left: 20px;
        }

        #homeBtn {
            right: 20px;
            background: #8c6bff;
        }

        #homeBtn:hover {
            background: #a88aff;
        }


        .list-group-item {
            background: #1e1a2e !important;
            color: #e7cfff !important;
            border-color: #7b4dff !important;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <h2>🥗 Diet Recommendation</h2>

    <form method="POST" class="diet-box">
        <label class="fw-bold mb-2">Choose Diet Type</label>
        <select name="diet_type" class="form-select mb-3" required>
            <option value="veg">🌿 Vegetarian</option>
            <option value="nonveg">🍗 Non-Veg</option>
            <option value="fast_fatloss">🔥 Fast Fat Loss</option>
            <option value="high_protein">💪 High Protein</option>
            <option value="budget">💸 Budget Diet</option>
        </select>
        <button class="btn-purple w-100 py-2">Generate Diet 🔥</button>
    </form>

    {% if plan %}
    <div class="diet-box mt-4">
        <h4 class="text-warning fw-bold mb-2">Your Smart Diet Plan 🍽</h4>
        <ul class="list-group">
            {% for item in plan %}
            <li class="list-group-item">{{item}}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <button id="backBtn" onclick="history.back()" class="nav-btn">⬅ Back</button>
    <a id="homeBtn" href="/" class="nav-btn">🏠 Home</a>

</body>

</html>
